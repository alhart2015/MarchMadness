<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 March Madness Bracket</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0a0e1a;color:#e0e6f0;min-height:100vh}

/* Header */
header{background:linear-gradient(135deg,#1a2540 0%,#0d1829 100%);border-bottom:2px solid #2a4080;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
header h1{font-size:1.4rem;color:#fff;letter-spacing:.04em;text-shadow:0 0 12px #4080ff88}
.header-buttons{display:flex;gap:10px;flex-wrap:wrap}
.btn{padding:7px 16px;border:none;border-radius:6px;cursor:pointer;font-size:.82rem;font-weight:600;letter-spacing:.02em;transition:background .18s,transform .1s}
.btn:active{transform:scale(.97)}
.btn-reset{background:#c0392b;color:#fff}
.btn-reset:hover{background:#e74c3c}
.btn-copy{background:#27ae60;color:#fff}
.btn-copy:hover{background:#2ecc71}
.btn-print{background:#2c3e50;color:#ccc;border:1px solid #4a6080}
.btn-print:hover{background:#34495e}

/* Legend */
.legend{display:flex;gap:14px;align-items:center;padding:7px 24px;background:#0d1829;border-bottom:1px solid #1e3060;flex-wrap:wrap;font-size:.77rem;color:#8899bb}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-dot{width:11px;height:11px;border-radius:3px}
.dot-model{background:#2563eb}.dot-user{background:#16a34a}.dot-upset{background:#ea580c}.dot-lose{background:#374151}

/* Bracket */
.bracket-wrap{overflow-x:auto;padding:18px 12px 8px}
.bracket-outer{min-width:1340px}

/* Round labels row */
.round-labels{display:grid;grid-template-columns:repeat(4,140px) 120px repeat(4,140px);margin-bottom:6px;min-width:1340px}
.round-label{text-align:center;font-size:.67rem;font-weight:700;color:#4a6899;letter-spacing:.08em;text-transform:uppercase;padding:3px 2px}

/* Main grid */
.bracket-grid{display:grid;grid-template-columns:repeat(4,140px) 120px repeat(4,140px);grid-template-rows:1fr;min-width:1340px}

/* Column */
.col{display:flex;flex-direction:column}
.col-center{display:flex;flex-direction:column;align-items:center;justify-content:space-around;padding:0 4px}

/* Region label */
.region-label{font-size:.63rem;color:#5577aa;text-align:center;font-weight:700;padding:2px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.region-sep{height:12px}

/* Spacer */
.sp{flex-shrink:0}

/* Matchup card */
.matchup{position:relative;margin:2px 2px;border-radius:6px;border:1px solid #1e3060;background:#111827;cursor:default;transition:border-color .15s,box-shadow .15s}
.matchup:hover{border-color:#4080ff;box-shadow:0 0 8px #4080ff44;z-index:5}
.matchup.active-tip{border-color:#60a0ff;box-shadow:0 0 12px #4080ff66;z-index:10}

/* Team row */
.team-row{display:flex;flex-direction:column;padding:4px 6px 3px;border-radius:4px;cursor:pointer;transition:background .12s}
.team-row:first-child{border-bottom:1px solid #1e3060}
.team-row:hover{background:#1e2d50 !important;opacity:1 !important}

/* Pick states */
.pick-model{background:#1a2e5a}
.pick-user{background:#1a3a26}
.pick-upset{background:#3a1a08}
.pick-lose{background:#111827;opacity:.52}
.pick-tbd{background:#111827;opacity:.72}

.pick-model .team-name{color:#93c5fd;font-weight:700}
.pick-user  .team-name{color:#86efac;font-weight:700}
.pick-upset .team-name{color:#fb923c;font-weight:700}
.pick-lose  .team-name{color:#6b7280;font-weight:400}
.pick-tbd   .team-name{color:#9ca3af;font-weight:400}

.team-header{display:flex;align-items:center;justify-content:space-between;gap:4px}
.team-seed{font-size:.6rem;color:#6b7280;min-width:14px;font-weight:600}
.team-name{font-size:.7rem;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#cbd5e1}
.team-prob{font-size:.6rem;color:#9ca3af;min-width:30px;text-align:right}
.prob-bar-wrap{height:3px;background:#1f2937;border-radius:2px;margin-top:2px;overflow:hidden}
.prob-bar{height:100%;border-radius:2px;transition:width .3s}
.bar-model{background:#3b82f6}.bar-user{background:#22c55e}.bar-upset{background:#f97316}.bar-lose{background:#374151}.bar-tbd{background:#4b5563}

/* Center championship label */
.champ-label{text-align:center;margin:6px 0 4px;padding:5px 10px;background:#1a2540;border-radius:6px;border:1px solid #2a4080;font-size:.6rem;color:#fbbf24;font-weight:700;letter-spacing:.07em;text-transform:uppercase;white-space:nowrap}
.ff-label{text-align:center;font-size:.6rem;color:#5577aa;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}

/* Tooltip */
#tooltip{position:fixed;background:#0d1829;border:1px solid #2a4080;border-radius:8px;padding:12px 14px;min-width:220px;max-width:270px;z-index:9999;pointer-events:none;font-size:.77rem;box-shadow:0 8px 24px #00000099;display:none}
#tooltip.vis{display:block}
.tt-title{font-weight:700;color:#93c5fd;margin-bottom:6px;font-size:.81rem;border-bottom:1px solid #1e3060;padding-bottom:5px}
.tt-sec-lbl{font-size:.66rem;color:#5577aa;text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px;font-weight:700}
.tt-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.tt-name{font-weight:600;color:#e2e8f0;font-size:.76rem}
.tt-prob{font-weight:700;color:#60a5fa;font-size:.76rem}
.tt-adv-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px 10px;margin-top:3px}
.tt-adv-item{display:flex;justify-content:space-between;font-size:.68rem;color:#94a3b8}
.tt-adv-item span:last-child{color:#cbd5e1;font-weight:600}
.tt-hint{font-size:.66rem;color:#4b5563;margin-top:6px;font-style:italic}

/* Summary */
.summary{background:#0d1829;border-top:2px solid #2a4080;padding:18px 24px}
.summary h2{font-size:.95rem;color:#93c5fd;margin-bottom:12px;letter-spacing:.05em;text-transform:uppercase}
.sum-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:10px}
.sum-card{background:#111827;border:1px solid #1e3060;border-radius:7px;padding:11px 13px}
.sum-lbl{font-size:.66rem;color:#5577aa;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;font-weight:700}
.sum-val{font-size:.86rem;font-weight:700;color:#e2e8f0}
.sum-card.champ{border-color:#92400e;background:#1a1208}
.sum-card.champ .sum-val{color:#fbbf24;font-size:.98rem}

/* Copy output */
#copy-out{display:none;background:#0a0e1a;border:1px solid #2a4080;border-radius:8px;padding:14px;margin:10px 24px;font-family:'Courier New',monospace;font-size:.74rem;color:#a0b8d0;white-space:pre-wrap;max-height:380px;overflow-y:auto}

/* Print */
@media print{
  body{background:#fff;color:#000}
  header{background:#fff;border-bottom:2px solid #000}
  header h1{color:#000;text-shadow:none}
  .header-buttons,.legend,#tooltip,#copy-out{display:none!important}
  .bracket-wrap{overflow:visible}
  .bracket-outer,.bracket-grid,.round-labels{min-width:unset}
  .matchup{background:#f9f9f9;border-color:#ccc;box-shadow:none}
  .pick-model{background:#dbeafe}.pick-user{background:#dcfce7}.pick-upset{background:#ffedd5}.pick-lose{background:#f3f4f6}
  .pick-model .team-name{color:#1d4ed8}.pick-user .team-name{color:#15803d}.pick-upset .team-name{color:#c2410c}
  .summary{background:#fff;border-top:2px solid #000}
  .sum-card{background:#f9f9f9;border-color:#ccc}
  .sum-lbl{color:#666}.sum-val{color:#000}
}
</style>
</head>

// ── Team lookup ──
const teamById = {};
const REGIONS = ['East','West','South','Midwest'];
for (const reg of REGIONS)
  for (const [t1,t2] of RAW.bracket[reg]) {
    teamById[t1.id]=t1; teamById[t2.id]=t2;
  }

// ── Pairwise helper ──
function pw(a,b){
  if(!a||!b) return 0.5;
  const k=a<b?`${a}_${b}`:`${b}_${a}`;
  const v=RAW.pairwise[k];
  if(v===undefined) return 0.5;
  return a<b?v:1-v;
}

// ── User picks (key -> winning teamId) ──
const UP={};

function modelWinner(a,b){
  if(!a||!b) return a||b||null;
  return pw(a,b)>=0.5?a:b;
}
function winner(key,a,b){
  if(!a&&!b) return null;
  if(!a) return b;
  if(!b) return a;
  return UP[key]!==undefined?UP[key]:modelWinner(a,b);
}
function isUser(key){return UP[key]!==undefined}

// ── Compute full bracket state ──
function compute(){
  const rr={};
  for(const reg of REGIONS){
    const r1=RAW.bracket[reg].map(([t1,t2],sl)=>{
      const key=`${reg}_r1_${sl}`;
      const w=winner(key,t1.id,t2.id);
      const wt=w?teamById[w]:null;
      const ot=wt?(w===t1.id?t2:t1):null;
      return{key,sl,t1,t2,w,wu:isUser(key),upset:wt&&ot?wt.seed>ot.seed:false};
    });
    function nextRound(prev,rn){
      return prev.reduce((acc,m,i)=>{
        if(i%2===0){
          const m2=prev[i+1];
          const key=`${reg}_r${rn}_${Math.floor(i/2)}`;
          const a=m.w, b=m2?m2.w:null;
          const w=winner(key,a,b);
          const wt=w?teamById[w]:null;
          const at=a?teamById[a]:null, bt=b?teamById[b]:null;
          const ot=wt?(w===a?bt:at):null;
          acc.push({key,sl:Math.floor(i/2),t1:at,t2:bt,w,wu:isUser(key),upset:wt&&ot?wt.seed>ot.seed:false});

      },[]);
    }
    const r2=nextRound(r1,2);

    const r4=nextRound(r3,4);
    rr[reg]=[r1,r2,r3,r4];

    const wt=w?teamById[w]:null;

    return{key,t1:at,t2:bt,w,wu:isUser(key),upset:wt&&ot?wt.seed>ot.seed:false};

  const lf4=f4m('f4_left',ew,sw);

  const ncg=(()=>{

  const{key,t1,t2,w}=m;
  const t1w=w&&t1&&w===t1.id, t2w=w&&t2&&w===t2.id;
  let p1=0.5,p2=0.5;
  if(t1&&t2){p1=pw(t1.id,t2.id);p2=1-p1;}
  else if(t1&&!t2){p1=1;p2=0;}
  else if(!t1&&t2){p1=0;p2=1;}
  const w1=(p1*100).toFixed(0), w2=(p2*100).toFixed(0);
  const c1=mClass(t1,m,t1w), c2=mClass(t2,m,t2w);
  const b1=bClass(t1,m,t1w), b2=bClass(t2,m,t2w);
  const n1=t1?t1.name:'TBD', n2=t2?t2.name:'TBD';
  const s1=t1?t1.seed:'-', s2=t2?t2.seed:'-';
  const showP=!!(t1&&t2);
  return `<div class="matchup" data-key="${key}" onmouseenter="showTT(event,'${key}')" onmouseleave="hideTT()">
<div class="team-row ${c1}" onclick="pick(event,'${key}',${t1?t1.id:'null'})">
<div class="team-header"><span class="team-seed">${s1}</span><span class="team-name">${n1}</span><span class="team-prob">${showP?w1+'%':''}</span></div>
<div class="prob-bar-wrap"><div class="prob-bar ${b1}" style="width:${showP?w1:50}%"></div></div>
</div>
<div class="team-row ${c2}" onclick="pick(event,'${key}',${t2?t2.id:'null'})">
<div class="team-header"><span class="team-seed">${s2}</span><span class="team-name">${n2}</span><span class="team-prob">${showP?w2+'%':''}</span></div>
<div class="prob-bar-wrap"><div class="prob-bar ${b2}" style="width:${showP?w2:50}%"></div></div>
</div>
</div>`;
}

function sp(h){return`<div class="sp" style="height:${h}px"></div>`;}

// ── Build full bracket ──
function build(){
  const st=compute();
  const grid=document.getElementById('bgrid');
  const rl=document.getElementById('rlabels');

  // Round labels
  const lbls=['R64','R32','S16','E8','','E8','S16','R32','R64'];
  rl.innerHTML=lbls.map(n=>`<div class="round-label">${n}</div>`).join('');

  // 9 columns
  grid.innerHTML='';
  const cols=[];
  for(let i=0;i<9;i++){
    const d=document.createElement('div');
    d.className=i===4?'col col-center':'col';
    d.style.gridColumn=i+1;
    d.style.gridRow=1;
    cols.push(d);
    grid.appendChild(d);
  }

  function fillRegion(reg, c0,c1,c2,c3, topGap, topLabel){
    const rounds=st.rr[reg];
    // col 0: 8 R1 matchups
    if(topLabel) cols[c0].innerHTML+=`<div class="region-label">${reg.toUpperCase()}</div>`;
    else cols[c0].innerHTML+=`<div class="region-sep"></div><div class="region-label">${reg.toUpperCase()}</div>`;
    rounds[0].forEach(m=>{ cols[c0].innerHTML+=renderM(m); });

    // col 1: R2 with spacing
    cols[c1].innerHTML+=(topLabel?'':sp(topGap>0?topGap+10:10))+sp(26);
    rounds[1].forEach((m,i)=>{ cols[c1].innerHTML+=renderM(m); if(i<3) cols[c1].innerHTML+=sp(28); });

    // col 2: R3
    cols[c2].innerHTML+=(topLabel?'':sp(topGap>0?topGap+40:40))+sp(66);
    rounds[2].forEach((m,i)=>{ cols[c2].innerHTML+=renderM(m); if(i<1) cols[c2].innerHTML+=sp(112); });

    // col 3: E8
    cols[c3].innerHTML+=(topLabel?'':sp(topGap>0?topGap+100:100))+sp(152);
    cols[c3].innerHTML+=renderM(rounds[3][0]);
  }

  // Left side: East (top) + West (bottom), columns 0,1,2,3
  fillRegion('East',0,1,2,3,0,true);
  fillRegion('West',0,1,2,3,10,false);

  // Right side: South (top) + Midwest (bottom), columns 8,7,6,5
  fillRegion('South',8,7,6,5,0,true);
  fillRegion('Midwest',8,7,6,5,10,false);

  // Center column: F4 + Championship + F4
  const cc=cols[4];
  cc.innerHTML=`
<div style="height:10px"></div>
<div class="ff-label">FINAL FOUR</div>
<div style="flex:1;display:flex;flex-direction:column;justify-content:space-around;align-items:center;gap:0">
  <div style="width:100%">${renderM(st.lf4)}</div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
    <div class="champ-label">&#127942; Championship</div>
    ${renderM(st.ncg)}
  </div>
  <div style="width:100%">${renderM(st.rf4)}</div>
</div>
<div style="height:10px"></div>
`;

  updateSummary(st);
}

function updateSummary(st){
  const g=document.getElementById('sum-grid');
  const ts=t=>t?`(${t.seed}) ${t.name}`:'TBD';
  const e8={};
  for(const reg of REGIONS) e8[reg]=st.rr[reg][3][0].w?teamById[st.rr[reg][3][0].w]:null;
  const lw=st.lf4.w?teamById[st.lf4.w]:null;
  const rw=st.rf4.w?teamById[st.rf4.w]:null;
  const ch=st.ncg.w?teamById[st.ncg.w]:null;
  g.innerHTML=`
<div class="sum-card"><div class="sum-lbl">East &mdash; Elite Eight</div><div class="sum-val">${ts(e8.East)}</div></div>
<div class="sum-card"><div class="sum-lbl">West &mdash; Elite Eight</div><div class="sum-val">${ts(e8.West)}</div></div>
<div class="sum-card"><div class="sum-lbl">South &mdash; Elite Eight</div><div class="sum-val">${ts(e8.South)}</div></div>
<div class="sum-card"><div class="sum-lbl">Midwest &mdash; Elite Eight</div><div class="sum-val">${ts(e8.Midwest)}</div></div>
<div class="sum-card"><div class="sum-lbl">Final Four &mdash; East/South</div><div class="sum-val">${ts(lw)}</div></div>
<div class="sum-card"><div class="sum-lbl">Final Four &mdash; West/Midwest</div><div class="sum-val">${ts(rw)}</div></div>
<div class="sum-card champ"><div class="sum-lbl">&#127942; National Champion</div><div class="sum-val">${ts(ch)}</div></div>
`;
}

// ── Interaction ──
function pick(e,key,tid){
  e.stopPropagation();
  if(tid===null) return;
  if(UP[key]===tid){ delete UP[key]; }
  else{
    UP[key]=tid;
    clearDown(key);
  }
  build(); hideTT();
}

function clearDown(key){
  const p=key.split('_');
  if(p[0]==='ncg') return;
  if(p[0]==='f4'){ delete UP.ncg; return; }
  const reg=p[0], rn=parseInt(p[1].replace('r',''));
  for(let r=rn+1;r<=4;r++){
    const n=Math.pow(2,4-r);
    for(let s=0;s<n;s++) delete UP[`${reg}_r${r}_${s}`];
  }
  delete UP.f4_left; delete UP.f4_right; delete UP.ncg;
}

function resetToModel(){
  Object.keys(UP).forEach(k=>delete UP[k]);
  build();
}

// ── Copy bracket ──
function copyBracket(){
  const st=compute();
  const ts=t=>t?`(${t.seed}) ${t.name}`:'TBD';
  const tag=m=>m.wu?'[YOU]':'[MODEL]';
  const lines=['=== 2026 MARCH MADNESS BRACKET PICKS ===',''];
  for(const reg of REGIONS){
    lines.push(`--- ${reg.toUpperCase()} ---`);
    const rn=['Round of 64','Round of 32','Sweet 16','Elite Eight'];
    st.rr[reg].forEach((round,ri)=>{
      lines.push(`  ${rn[ri]}:`);
      round.forEach(m=>{
        const wt=m.w?teamById[m.w]:null;
        lines.push(`    ${ts(m.t1)} vs ${ts(m.t2)}  ->  ${ts(wt)} ${tag(m)}`);
      });
    });
    lines.push('');
  }
  lines.push('--- FINAL FOUR ---');
  const lwt=st.lf4.w?teamById[st.lf4.w]:null;
  const rwt=st.rf4.w?teamById[st.rf4.w]:null;
  lines.push(`  East/South:      ${ts(st.lf4.t1)} vs ${ts(st.lf4.t2)}  ->  ${ts(lwt)} ${tag(st.lf4)}`);
  lines.push(`  West/Midwest:    ${ts(st.rf4.t1)} vs ${ts(st.rf4.t2)}  ->  ${ts(rwt)} ${tag(st.rf4)}`);
  lines.push('');
  lines.push('--- NATIONAL CHAMPIONSHIP ---');
  const ch=st.ncg.w?teamById[st.ncg.w]:null;
  lines.push(`  ${ts(st.ncg.t1)} vs ${ts(st.ncg.t2)}  ->  CHAMPION: ${ts(ch)} ${tag(st.ncg)}`);
  const txt=lines.join('\n');
  const btn=document.getElementById('copy-btn');
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(()=>{
      btn.textContent='Copied!';btn.style.background='#166534';
      setTimeout(()=>{btn.textContent='Copy Bracket';btn.style.background='';},2000);
    }).catch(()=>showCopyText(txt));
  } else showCopyText(txt);
}

function showCopyText(txt){
  const el=document.getElementById('copy-out');
  el.textContent=txt; el.style.display='block';
  el.scrollIntoView({behavior:'smooth'});
}

// ── Tooltip ──
let ttTO=null;
function showTT(e,key){
  if(ttTO) clearTimeout(ttTO);
  const st=compute();
  let m=null;
  outer: for(const reg of REGIONS) for(const rd of st.rr[reg]) for(const mm of rd) if(mm.key===key){m=mm;break outer;}
  if(!m) m=[st.lf4,st.rf4,st.ncg].find(x=>x.key===key)||null;
  if(!m||(!m.t1&&!m.t2)) return;
  const tt=document.getElementById('tooltip');
  const {t1,t2}=m;
  let html='';
  if(t1&&t2){
    const p1=pw(t1.id,t2.id), p2=1-p1;
    html+=`<div class="tt-title">Head-to-Head</div>`;
    html+=`<div class="tt-row"><span class="tt-name">(${t1.seed}) ${t1.name}</span><span class="tt-prob">${(p1*100).toFixed(1)}%</span></div>`;
    html+=`<div class="tt-row"><span class="tt-name">(${t2.seed}) ${t2.name}</span><span class="tt-prob">${(p2*100).toFixed(1)}%</span></div>`;
    html+=`<div style="margin-top:8px"><div class="tt-sec-lbl">Advancement Probabilities</div>`;
    html+=`<div class="tt-adv-grid">`;
    const AK=['R1','R2','R3','R4','R5','R6'];
    const AL=['R64','R32','S16','E8','F4','Champ'];
    html+=`<div style="color:#93c5fd;font-size:.68rem;font-weight:700;margin-bottom:2px">${t1.name}</div>`;
    html+=`<div style="color:#fca5a5;font-size:.68rem;font-weight:700;margin-bottom:2px">${t2.name}</div>`;
    for(let i=0;i<AK.length;i++){
      const k=AK[i],l=AL[i];
      html+=`<div class="tt-adv-item"><span>${l}</span><span>${t1.adv[k]!==undefined?(t1.adv[k]*100).toFixed(1)+'%':'-'}</span></div>`;
      html+=`<div class="tt-adv-item"><span>${l}</span><span>${t2.adv[k]!==undefined?(t2.adv[k]*100).toFixed(1)+'%':'-'}</span></div>`;
    }
    html+=`</div></div>`;
  } else {
    const t=t1||t2;
    html+=`<div class="tt-title">(${t.seed}) ${t.name}</div>`;
    html+=`<div class="tt-sec-lbl">Advancement Probabilities</div>`;
    html+=`<div class="tt-adv-grid">`;
    const AK=['R1','R2','R3','R4','R5','R6'];
    const AL=['R64','R32','S16','E8','F4','Champ'];
    for(let i=0;i<AK.length;i++){
      html+=`<div class="tt-adv-item"><span>${AL[i]}</span><span>${t.adv[AK[i]]!==undefined?(t.adv[AK[i]]*100).toFixed(1)+'%':'-'}</span></div>`;
    }
    html+=`</div>`;
  }
  html+=`<div class="tt-hint">Click a team to override pick</div>`;
  tt.innerHTML=html;
  tt.classList.add('vis');
  posTT(e);
  document.querySelectorAll('.matchup').forEach(el=>el.classList.remove('active-tip'));
  const mel=document.querySelector(`.matchup[data-key="${key}"]`);
  if(mel) mel.classList.add('active-tip');
}

function posTT(e){
  const tt=document.getElementById('tooltip');
  const mg=12;
  let x=e.clientX+mg, y=e.clientY+mg;
  const w=tt.offsetWidth||260, h=tt.offsetHeight||200;
  if(x+w>window.innerWidth-8) x=e.clientX-w-mg;
  if(y+h>window.innerHeight-8) y=e.clientY-h-mg;
  tt.style.left=x+'px'; tt.style.top=y+'px';
}

document.addEventListener('mousemove',e=>{
  const tt=document.getElementById('tooltip');
  if(tt.classList.contains('vis')) posTT(e);
});

function hideTT(){
  ttTO=setTimeout(()=>{
    document.getElementById('tooltip').classList.remove('vis');
    document.querySelectorAll('.matchup').forEach(el=>el.classList.remove('active-tip'));
  },100);
}

// Init
build();
</script>
</body>
</html>
